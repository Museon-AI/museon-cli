name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: uv run pytest -q
      - run: uv run python scripts/gen_command_docs.py --check
      - run: uv run python scripts/gen_command_contract.py --check

  node-test:
    name: npm launcher and templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.14.0"
      - run: npm install --global npm@11.5.1
      - run: node --test npm/tests/*.test.cjs

  package:
    name: Build and inspect Python artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - run: uv build
      - name: Verify public package boundary
        run: uv run python scripts/verify_public_artifacts.py
      - name: Smoke install wheel
        run: uv run python scripts/smoke_install.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: museoncli-python-dist
          path: |
            dist/*
            contracts/command-catalog.json

  native:
    name: Native and npm smoke (${{ matrix.target }})
    needs: [package, node-test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-arm64-gnu
            runner: ubuntu-22.04-arm
          - target: linux-x64-gnu
            runner: ubuntu-22.04
          - target: win32-x64
            runner: windows-2025
          - target: win32-arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.14.0"
      - run: npm install --global npm@11.5.1
      - run: uv sync --frozen --all-groups
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: museoncli-python-dist
          path: reviewed
      - name: Build and smoke reviewed wheel
        shell: bash
        run: |
          set -euo pipefail
          wheel=$(find reviewed -name '*.whl' -type f -print -quit)
          uv run python scripts/build_native.py --target "${{ matrix.target }}" --wheel "${wheel}"
          uv run python scripts/smoke_native.py --target "${{ matrix.target }}"
      - name: Generate and verify npm packages
        shell: bash
        run: |
          set -euo pipefail
          uv run python scripts/generate_npm_packages.py --target "${{ matrix.target }}"
          uv run python scripts/verify_npm_packages.py --package-root build/npm --allow-partial
          uv run python scripts/pack_npm_packages.py --package cli --package "${{ matrix.target }}"
          uv run python scripts/verify_npm_packages.py --tarball-dir npm-dist --allow-partial
          uv run python scripts/package_native.py --target "${{ matrix.target }}"
      - name: npm install without scripts and wrapper smoke
        shell: bash
        run: |
          set -euo pipefail
          root_tar=$(find "${PWD}/npm-dist" -name 'museon-cli-[0-9]*.tgz' -type f -print -quit)
          platform_tar=$(find "${PWD}/npm-dist" -name 'museon-cli-*.tgz' ! -name 'museon-cli-[0-9]*.tgz' -type f -print -quit)
          npm install --global --ignore-scripts "${root_tar}" "${platform_tar}"
          museoncli version
          museon schema
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: museoncli-${{ matrix.target }}-dist
          path: |
            npm-dist/*.tgz
            native-dist/*

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Export locked runtime dependencies
        run: >-
          uv export --frozen --no-dev --no-emit-project --format requirements.txt
          --output-file /tmp/museoncli-requirements.txt
      - name: Audit dependencies
        run: >-
          uvx pip-audit --disable-pip --no-deps
          --requirement /tmp/museoncli-requirements.txt
