name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --frozen --all-groups
      - name: Verify release source
        run: |
          set -euo pipefail
          package_version=$(uv run python -c 'from museoncli import __version__; print(__version__)')
          test "v${package_version}" = "${GITHUB_REF_NAME}"
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - name: Test and build the public wheel
        run: |
          set -euo pipefail
          uv run ruff check .
          uv run pytest -q
          uv run python scripts/gen_command_docs.py --check
          uv run python scripts/gen_command_contract.py --check
          uv build --wheel
          uv run python scripts/verify_public_artifacts.py
          uv run python scripts/smoke_install.py
      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir release
          cp dist/*.whl contracts/command-catalog.json docs/install.md release/
          (cd release && sha256sum -- * > checksums.txt)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: release/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release
      - name: Create or verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            existing_tag=$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json tagName --jq .tagName)
            test "${existing_tag}" = "${GITHUB_REF_NAME}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --draft \
              --generate-notes
          fi
          mapfile -d '' assets < <(find release -type f -print0)
          python scripts/sync_release_assets.py \
            --tag "${GITHUB_REF_NAME}" \
            --repository "${GITHUB_REPOSITORY}" \
            "${assets[@]}"
          is_draft=$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq .isDraft)
          if [[ "${is_draft}" = "true" ]]; then
            gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false
          fi
      - name: Validate private runtime GitHub App ID
        shell: bash
        env:
          APP_ID: ${{ secrets.MUSEON_RUNTIME_APP_ID || secrets.MUSEON_RUNTIME_APP_CLIENT_ID }}
        run: |
          set -euo pipefail
          if [[ ! "${APP_ID}" =~ ^[0-9]+$ ]]; then
            echo "Configure MUSEON_RUNTIME_APP_ID with the numeric GitHub App ID." >&2
            exit 1
          fi
      - name: Create short-lived private runtime token
        id: runtime-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.MUSEON_RUNTIME_APP_ID || secrets.MUSEON_RUNTIME_APP_CLIENT_ID }}
          private-key: ${{ secrets.MUSEON_RUNTIME_APP_PRIVATE_KEY }}
          owner: Museon-AI
          repositories: museon
          permission-contents: write
      - name: Dispatch wheel to private Agent runtime
        env:
          GH_TOKEN: ${{ steps.runtime-app-token.outputs.token }}
        run: |
          set -euo pipefail
          wheel=$(find release -name '*.whl' -type f -print -quit)
          wheel_name=$(basename "${wheel}")
          wheel_sha256=$(sha256sum "${wheel}" | awk '{print $1}')
          contract=release/command-catalog.json
          contract_sha256=$(sha256sum "${contract}" | awk '{print $1}')
          jq -n \
            --arg wheel_url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${wheel_name}" \
            --arg wheel_sha256 "${wheel_sha256}" \
            --arg contract_url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/command-catalog.json" \
            --arg contract_sha256 "${contract_sha256}" \
            --arg version "${GITHUB_REF_NAME#v}" \
            '{event_type: "museoncli-release", client_payload: {wheel_url: $wheel_url, wheel_sha256: $wheel_sha256, contract_url: $contract_url, contract_sha256: $contract_sha256, version: $version}}' \
            | gh api --method POST repos/Museon-AI/museon/dispatches --input -
