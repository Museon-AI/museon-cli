name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --frozen --all-groups
      - name: Verify release tag
        run: |
          package_version=$(uv run python -c 'from museoncli import __version__; print(__version__)')
          test "v${package_version}" = "${GITHUB_REF_NAME}"
      - name: Verify release commit is on main
        run: |
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Release commit ${GITHUB_SHA} is not reachable from origin/main." >&2
            exit 1
          fi
      - run: uv run ruff check .
      - run: uv run pytest -q
      - run: uv run python scripts/gen_command_docs.py --check
      - run: uv run python scripts/gen_command_contract.py --check
      - run: uv build
      - name: Verify public package boundary
        run: uv run python scripts/verify_public_artifacts.py
      - name: Smoke install wheel
        run: uv run python scripts/smoke_install.py
      - name: Create checksums
        run: |
          mkdir -p release-assets
          sha256sum dist/* > release-assets/checksums.txt
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist
          format: spdx-json
          output-file: release-assets/museoncli.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Attest release provenance
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: "dist/*"
      - name: Attest release SBOM
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: "dist/*"
          sbom-path: release-assets/museoncli.spdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: |
            dist/*
            contracts/command-catalog.json
            release-assets/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: release
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: release/dist/

  attach-release-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: release
      - env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${GITHUB_REF_NAME}"
          --repo Museon-AI/museon-cli
          release/dist/*
          release/contracts/command-catalog.json
          release/release-assets/*
          --clobber

  notify-private-runtime:
    needs: [publish-pypi, attach-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: release
      - name: Dispatch verified wheel to private Agent runtime
        env:
          GH_TOKEN: ${{ secrets.MUSEON_RUNTIME_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "MUSEON_RUNTIME_DISPATCH_TOKEN is not configured; runtime dispatch skipped."
            exit 0
          fi
          wheel=$(find release/dist -maxdepth 1 -name '*.whl' -type f -print -quit)
          if [[ -z "${wheel}" ]]; then
            echo "No wheel found in release artifact" >&2
            exit 1
          fi
          wheel_name=$(basename "${wheel}")
          wheel_sha256=$(sha256sum "${wheel}" | awk '{print $1}')
          wheel_url="https://github.com/Museon-AI/museon-cli/releases/download/${GITHUB_REF_NAME}/${wheel_name}"
          contract=release/contracts/command-catalog.json
          contract_sha256=$(sha256sum "${contract}" | awk '{print $1}')
          contract_url="https://github.com/Museon-AI/museon-cli/releases/download/${GITHUB_REF_NAME}/command-catalog.json"
          jq -n \
            --arg wheel_url "${wheel_url}" \
            --arg wheel_sha256 "${wheel_sha256}" \
            --arg contract_url "${contract_url}" \
            --arg contract_sha256 "${contract_sha256}" \
            --arg version "${GITHUB_REF_NAME#v}" \
            '{event_type: "museoncli-release", client_payload: {wheel_url: $wheel_url, wheel_sha256: $wheel_sha256, contract_url: $contract_url, contract_sha256: $contract_sha256, version: $version}}' \
            | gh api --method POST repos/Museon-AI/museon/dispatches --input -
